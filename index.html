<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Campus Drive Prediction System</title>
    <style>
        :root {
    --primary: #6366f1;
    --primary-hover: #4f46e5;
    --background: #0f172a;
    --surface: #1e293b;
    --surface-hover: #334155;
    --text: #f8fafc;
    --text-muted: #94a3b8;
    --border: #334155;
    --success: #10b981;
    --warning: #f59e0b;
    --danger: #ef4444;
}

* {
    margin: 0;
    padding: 0;
    box-sizing: border-box;
    font-family: 'Inter', sans-serif;
}

body {
    background: var(--background);
    background-image: 
        radial-gradient(at 0% 0%, hsla(253,16%,7%,1) 0, transparent 50%), 
        radial-gradient(at 50% 0%, hsla(225,39%,30%,0.5) 0, transparent 50%), 
        radial-gradient(at 100% 0%, hsla(339,49%,30%,0.5) 0, transparent 50%);
    color: var(--text);
    min-height: 100vh;
    display: flex;
    justify-content: center;
    align-items: center;
    padding: 2rem;
}

.container {
    background: rgba(30, 41, 59, 0.7);
    backdrop-filter: blur(16px);
    -webkit-backdrop-filter: blur(16px);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 24px;
    padding: 3rem;
    width: 100%;
    max-width: 500px;
    box-shadow: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
    transition: transform 0.3s ease;
}

.container:hover {
    transform: translateY(-5px);
}

header {
    text-align: center;
    margin-bottom: 2.5rem;
}

h1 {
    font-size: 2rem;
    font-weight: 700;
    background: linear-gradient(to right, #818cf8, #c084fc);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    margin-bottom: 0.5rem;
}

header p {
    color: var(--text-muted);
    font-size: 0.95rem;
}

.form-group {
    margin-bottom: 1.5rem;
}

label {
    display: block;
    margin-bottom: 0.5rem;
    font-weight: 500;
    font-size: 0.9rem;
    color: var(--text-muted);
}

input {
    width: 100%;
    padding: 1rem;
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--border);
    border-radius: 12px;
    color: var(--text);
    font-size: 1rem;
    transition: all 0.3s ease;
}

input:focus {
    outline: none;
    border-color: var(--primary);
    box-shadow: 0 0 0 3px rgba(99, 102, 241, 0.2);
    background: rgba(15, 23, 42, 0.8);
}

input::placeholder {
    color: #475569;
}

button {
    width: 100%;
    padding: 1rem;
    background: linear-gradient(135deg, var(--primary), #8b5cf6);
    color: white;
    border: none;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    cursor: pointer;
    transition: all 0.3s ease;
    display: flex;
    justify-content: center;
    align-items: center;
    gap: 0.5rem;
    margin-top: 1rem;
}

button:hover {
    transform: translateY(-2px);
    box-shadow: 0 10px 20px -10px rgba(99, 102, 241, 0.6);
}

button:active {
    transform: translateY(0);
}

button:disabled {
    opacity: 0.7;
    cursor: not-allowed;
    transform: none;
}

/* Spinner for loading state */
.spinner {
    display: none;
    width: 20px;
    height: 20px;
    border: 3px solid rgba(255,255,255,0.3);
    border-radius: 50%;
    border-top-color: white;
    animation: spin 1s ease-in-out infinite;
}

@keyframes spin {
    to { transform: rotate(360deg); }
}

/* Results Section */
.result-container {
    margin-top: 2rem;
    overflow: hidden;
    transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
    max-height: 200px;
    opacity: 1;
}

.result-container.hidden {
    max-height: 0;
    opacity: 0;
    margin-top: 0;
}

.result-card {
    background: rgba(15, 23, 42, 0.6);
    border: 1px solid var(--border);
    border-radius: 16px;
    padding: 1.5rem;
    text-align: center;
    transform: translateY(0);
    transition: transform 0.3s ease;
}

.result-card.success-border {
    border-color: var(--success);
    box-shadow: 0 0 20px rgba(16, 185, 129, 0.1);
}

.result-card.warning-border {
    border-color: var(--warning);
    box-shadow: 0 0 20px rgba(245, 158, 11, 0.1);
}

.result-card.danger-border {
    border-color: var(--danger);
    box-shadow: 0 0 20px rgba(239, 68, 68, 0.1);
}

h2 {
    font-size: 1.1rem;
    color: var(--text-muted);
    margin-bottom: 0.5rem;
}

.result-text {
    font-size: 1.25rem;
    font-weight: 600;
}

.status-1 {
    color: var(--success);
}
.status-0 {
    color: var(--danger);
}

@media (max-width: 480px) {
    .container {
        padding: 2rem 1.5rem;
    }
    }
    
    </style>
    <script>
        document.addEventListener('DOMContentLoaded', () => {
    const form = document.getElementById('predictionForm');
    const submitBtn = document.getElementById('submitBtn');
    const btnText = submitBtn.querySelector('.btn-text');
    const spinner = document.getElementById('spinner');
    
    const resultContainer = document.getElementById('resultContainer');
    const resultCard = document.getElementById('resultCard');
    const resultText = document.getElementById('resultText');

    form.addEventListener('submit', async (e) => {
        e.preventDefault();

        // UI Loading State
        submitBtn.disabled = true;
        btnText.textContent = 'Predicting...';
        spinner.style.display = 'block';
        
        // Hide previous results securely giving it time to collapse
        resultContainer.classList.add('hidden');
        resultCard.className = 'result-card'; // reset classes

        const data = {
            cgpa: parseFloat(document.getElementById('cgpa').value),
            skills: parseInt(document.getElementById('skills').value),
            projects: parseInt(document.getElementById('projects').value)
        };

        try {
            // Artificial delay to show loading animation (premium feel)
            await new Promise(r => setTimeout(r, 800));

            const response = await fetch('/predict', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                },
                body: JSON.stringify(data)
            });

            const result = await response.json();

            if (result.status === 'success') {
                resultText.textContent = result.prediction;
                
                // Add styling based on prediction outcome
                if (result.status_code === 1) {
                    if (result.prediction.includes("conditions")) {
                       resultCard.classList.add('warning-border');
                       resultText.style.color = "var(--warning)";
                    } else {
                        resultCard.classList.add('success-border');
                        resultText.style.color = "var(--success)";
                    }
                } else {
                    resultCard.classList.add('danger-border');
                    resultText.style.color = "var(--danger)";
                }

                // Show results with animation
                resultContainer.classList.remove('hidden');
            } else {
                alert('Error making prediction: ' + result.message);
            }

        } catch (error) {
            console.error('Error:', error);
            alert('Failed to connect to the server. Please ensure backend is running.');
        } finally {
            // Restore UI
            submitBtn.disabled = false;
            btnText.textContent = 'Predict Eligibility';
            spinner.style.display = 'none';
        }
    });
});
        
    </script>
    <!-- Google Fonts for typography -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
</head>
<body>
    <div class="container">
        <header>
            <h1>Placement Predictor</h1>
            <p>Enter your details to check eligibility</p>
        </header>

        <main>
            <form id="predictionForm">
                <div class="form-group">
                    <label for="cgpa">Current CGPA (out of 10)</label>
                    <input type="number" id="cgpa" name="cgpa" min="0" max="10" step="0.01" required placeholder="e.g., 8.5">
                </div>

                <div class="form-group">
                    <label for="skills">Number of Core Skills (e.g., Python, React)</label>
                    <input type="number" id="skills" name="skills" min="0" max="20" required placeholder="e.g., 3">
                </div>

                <div class="form-group">
                    <label for="projects">Number of Projects</label>
                    <input type="number" id="projects" name="projects" min="0" max="20" required placeholder="e.g., 2">
                </div>

                <button type="submit" id="submitBtn">
                    <span class="btn-text">Predict Eligibility</span>
                    <div class="spinner" id="spinner"></div>
                </button>
            </form>

            <div id="resultContainer" class="result-container hidden">
                <div class="result-card" id="resultCard">
                    <h2 id="resultHeading">Prediction Result</h2>
                    <p id="resultText" class="result-text"></p>
                </div>
            </div>
        </main>
    </div>

    <script src="{{ url_for('static', filename='script.js') }}"></script>
</body>
</html>
